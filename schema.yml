openapi: 3.0.3
info:
  title: Blog API
  version: 1.0.0
  description: API documentation for Blog project
paths:
  /api/admin/posts/export/:
    get:
      operationId: admin_posts_export_retrieve
      description: Export all (or filtered) posts to a CSV file for download. Only
        Admin (`is_staff=True`) can perform this. Excludes soft deleted (`is_deleted=True`)
        posts. Returns direct file download via StreamingHttpResponse.
      summary: Export Posts to CSV
      parameters:
      - in: query
        name: category
        schema:
          type: integer
        description: Filter by Category ID
      - in: query
        name: from
        schema:
          type: string
        description: 'From date. Format: YYYY-MM-DD'
      - in: query
        name: to
        schema:
          type: string
        description: 'To date. Format: YYYY-MM-DD'
      tags:
      - admin
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            text/csv:
              schema:
                type: string
                format: binary
              examples:
                WithData:
                  value: |-
                    id,title,author_username,category_name,tags,content,likes_count,bookmarks_count,created_at
                    1,Getting Started with DRF,johndoe,Backend,"drf, tutorial","[{""type"":""paragraph"",""data"":{""text"":""Hello""}}]",47,12,2024-01-14T10:00:00Z
                    2,Advanced Serializers,johndoe,Backend,"drf, advanced","[{""type"":""image"",""data"":{""url"":""/media/files/img.jpg""}}]",23,9,2024-01-10T08:00:00Z
                  summary: With Data
                  description: CSV output with data
                EmptyResult:
                  value: |
                    id,title,author_username,category_name,tags,content,likes_count,bookmarks_count,created_at
                  summary: Empty Result
                  description: Only header, no data rows
          description: CSV file containing posts data (id, title, author_username,
            category_name, tags, content, likes_count, bookmarks_count, created_at).
            Encoded in utf-8-sig.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportPostsToCSVError'
              examples:
                InvalidFromDate:
                  value:
                    from:
                    - Invalid date format. Use YYYY-MM-DD.
                  summary: Invalid from date
                InvalidToDate:
                  value:
                    to:
                    - Invalid date format. Use YYYY-MM-DD.
                  summary: Invalid to date
          description: Bad Request - Invalid date format
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportPostsToCSVUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportPostsToCSVForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - User is not an admin
  /api/admin/posts/import/:
    post:
      operationId: admin_posts_import_create
      description: 'Import multiple posts from a CSV file. Expected columns: title,
        content, category_name. Imported author is always the current authenticated
        admin.'
      summary: Import Posts from CSV
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportPostFromCSV'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImportPostFromCSV'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportPostFromCSV'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          description: Import stats (total_rows, imported, skipped, errors)
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPostsFromCSVError'
              examples:
                ErrorProcessingCSV:
                  value:
                    file:
                    - 'Error processing CSV: <error details>'
                  summary: Error processing CSV
                InvalidFileError:
                  value:
                    file:
                    - The submitted file is empty.
                  summary: Invalid file error
          description: Bad Request - Invalid or oversized file
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPostsToCSVUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPostsToCSVForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - User is not an admin
  /api/admin/users/:
    get:
      operationId: admin_users_retrieve
      description: Return paginated list of users for admin dashboard.
      summary: List Users (Admin)
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of users per page (max 100).
      - in: query
        name: offset
        schema:
          type: integer
        description: Number of users to skip.
      tags:
      - admin
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersPaginatedResponse'
          description: Paginated users list
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersUnauthorizedError'
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersForbiddenError'
          description: Forbidden - User is not an admin
  /api/admin/users/{id}/ban/:
    post:
      operationId: admin_users_ban_create
      description: Ban a user account by setting its is_active status to False. Only
        Admins can perform this action. You cannot ban yourself, another Admin, or
        an already banned user.
      summary: Ban User
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUser'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUserErrorResponse'
              examples:
                CannotBanYourself:
                  value:
                    non_field_errors:
                    - You cannot ban yourself.
                  summary: Cannot ban yourself
          description: Bad Request - Cannot ban yourself, another admin, or an already
            banned user
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUserUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUserForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - User is not an admin
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUserNotFoundError'
              examples:
                NotFound:
                  value:
                    detail: Not found.
                  summary: Not Found
          description: Not Found - User does not exist
  /api/admin/users/{id}/unban/:
    post:
      operationId: admin_users_unban_create
      description: Unban a user account by setting its is_active status to True. Only
        Admins can perform this action. You cannot unban an already active user.
      summary: Unban User
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUser'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnbanUserErrorResponse'
              examples:
                CannotUnbanActiveUser:
                  value:
                    non_field_errors:
                    - User is already active.
                  summary: Cannot unban active user
          description: Bad Request - Cannot unban an already active user
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnbanUserUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnbanUserForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - User is not an admin
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnbanUserNotFoundError'
              examples:
                NotFound:
                  value:
                    detail: Not found.
                  summary: Not Found
          description: Not Found - User does not exist
  /api/admin/users/export/:
    get:
      operationId: admin_users_export_retrieve
      description: Export users to a CSV file. Filter by is_active, is_staff, from_date,
        and to_date.
      summary: Export Users to CSV
      tags:
      - admin
      security:
      - tokenAuth: []
      responses:
        '200':
          description: CSV file containing users data
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportUsersToCSVError'
              examples:
                InvalidFromDate:
                  value:
                    from:
                    - Invalid date format. Use YYYY-MM-DD.
                  summary: Invalid from date
                InvalidIsActiveBoolean:
                  value:
                    is_active:
                    - Value must be 'true' or 'false'.
                  summary: Invalid is_active boolean
          description: Bad Request - Invalid date format or boolean value
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportUsersToCSVUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportUsersToCSVForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - User is not an admin
  /api/admin/users/import/:
    post:
      operationId: admin_users_import_create
      description: 'Import multiple users from a CSV file. Expected columns: username,
        email, password, first_name, last_name.'
      summary: Import Users from CSV
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportUserFromCSV'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImportUserFromCSV'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportUserFromCSV'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          description: Import stats (total_rows, imported, skipped, errors)
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportUsersFromCSVError'
              examples:
                ErrorProcessingCSV:
                  value:
                    file:
                    - 'Error processing CSV: <error details>'
                  summary: Error processing CSV
                InvalidFileError:
                  value:
                    file:
                    - The submitted file is empty.
                  summary: Invalid file error
          description: Bad Request - Invalid or oversized file
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportUsersToCSVUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportUsersToCSVForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - User is not an admin
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticates the user and returns a DRF Token (1 user - 1 token).
      summary: Log In
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginValidationError'
              examples:
                InvalidCredentialsOrBanned:
                  value:
                    non_field_errors:
                    - Unable to log in with provided credentials.
                  summary: Invalid credentials or banned account
                MissingFields:
                  value:
                    username:
                    - This field is required.
                    password:
                    - This field is required.
                  summary: Missing fields
          description: Bad Request
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Logs out completely by removing the user's DRF Token from the system.
        The token will be invalidated.
      summary: Log Out
      tags:
      - auth
      security:
      - tokenAuth: []
      responses:
        '204':
          content:
            application/json:
              schema: null
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogoutUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
                  summary: Missing or invalid token
          description: Unauthorized
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns profile information of the authenticated user.
      summary: View Current User Profile
      tags:
      - auth
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeGetUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized
    patch:
      operationId: auth_me_partial_update
      description: Partially updates the authenticated user's profile. Only `first_name`
        and `last_name` can be changed (max 100 characters each).
      summary: Update Current User Profile
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCurrentUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCurrentUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCurrentUser'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeUpdateValidationError'
              examples:
                FieldTooLong:
                  value:
                    first_name:
                    - Ensure this field has no more than 100 characters.
                  summary: Field too long
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeUpdateUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Creates a new user account. Validates input and saves to DB. Does
        not return a token (requires calling /login/ afterwards).
      summary: Sign Up
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegisterValidationError'
              examples:
                ValidationErrors:
                  value:
                    username:
                    - A user with that username already exists.
                    email:
                    - This email is already registered.
                    password:
                    - Password must be 8-50 characters and contain at least one letter
                      and one digit.
                    non_field_errors:
                    - Passwords do not match.
                  summary: Validation errors
                MissingFields:
                  value:
                    username:
                    - This field is required.
                    email:
                    - This field is required.
                    password:
                    - This field is required.
                    password_confirm:
                    - This field is required.
                  summary: Missing fields
          description: Bad Request
  /api/categories/:
    get:
      operationId: categories_list
      description: Returns a list of all categories including posts count. No authentication
        required. No pagination.
      summary: View Categories
      tags:
      - categories
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
          description: ''
    post:
      operationId: categories_create
      description: Creates a new category in the system. Requires Admin privileges.
        Returns 201 Created.
      summary: Create Category
      tags:
      - categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Category'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Category'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCreateValidationError'
              examples:
                DuplicateName:
                  value:
                    name:
                    - category with this name already exists.
                  summary: Name already exists
                MissingName:
                  value:
                    name:
                    - This field is required.
                  summary: Missing name field
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCreateUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCreateForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden
  /api/categories/{id}/:
    put:
      operationId: categories_update
      description: Updates an existing category name. Requires Admin privileges.
      summary: Update Category
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this category.
        required: true
      tags:
      - categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Category'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Category'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryUpdateValidationError'
              examples:
                DuplicateName:
                  value:
                    name:
                    - category with this name already exists.
                  summary: Name already exists
                MissingName:
                  value:
                    name:
                    - This field is required.
                  summary: Missing name field
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryUpdateUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryUpdateForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryUpdateNotFoundError'
              examples:
                NotFound:
                  value:
                    detail: Not found.
                  summary: Not Found
          description: Not Found
    delete:
      operationId: categories_destroy
      description: Soft deletes a category. Only Admin can perform this. Cannot delete
        a category that currently has non-deleted posts.
      summary: Delete Category
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this category.
        required: true
      tags:
      - categories
      security:
      - tokenAuth: []
      responses:
        '204':
          content:
            application/json:
              schema: null
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDeleteValidationError'
              examples:
                HasPosts:
                  value:
                    non_field_errors:
                    - Cannot delete category 'Backend Development' because it (or
                      its subcategories) has 28 active post(s).
                  summary: Category has posts
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDeleteUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDeleteForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDeleteNotFoundError'
              examples:
                NotFound:
                  value:
                    detail: Not found.
                  summary: Not Found
          description: Not Found
  /api/comments/{id}/:
    patch:
      operationId: comments_partial_update
      description: Update comment content or change/remove attached image. Only author
        can do this.
      summary: Update Comment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - comments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateComment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateComment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateComment'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUpdateValidationError'
              examples:
                ValidationError:
                  value:
                    content:
                    - This field may not be blank.
                  summary: Validation Error
          description: Bad Request - Validation Error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUpdateUnauthorizedError'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Unauthorized - Token is missing or invalid
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUpdateForbiddenError'
              examples:
                Forbidden:
                  value:
                    detail: You do not have permission to perform this action.
          description: Forbidden - You do not have permission
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUpdateNotFoundError'
              examples:
                NotFound:
                  value:
                    detail: Not found.
                  summary: Not Found
          description: Not Found - Comment does not exist
    delete:
      operationId: comments_destroy
      description: Soft delete a comment (set is_deleted=True). Owner or Admin only.
      summary: Delete Comment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - comments
      security:
      - tokenAuth: []
      responses:
        '204':
          content:
            application/json:
              schema: null
          description: ''
        '401':
          content:
