{% extends "base.html" %}
{% load static %}

{% block title %}Profile | Blog UI{% endblock %}

{% block content %}
<div class="page-wrap profile-dashboard">
  <aside class="profile-sidebar">
        <div class="profile-account">
            <p class="profile-kicker">Member Profile</p>
            <h1 id="profile-name" class="display-text profile-name">LOADING</h1>
            <p id="profile-email" class="muted profile-email"></p>
    </div>

        <nav class="profile-nav" aria-label="Profile sections">
            <button type="button" class="profile-tab is-active" data-tab="my-posts">My Posts</button>
            <button type="button" class="profile-tab" data-tab="liked">Liked Posts</button>
            <button type="button" class="profile-tab" data-tab="bookmarked">Bookmarked Posts</button>
    </nav>

        <button id="btn-logout" class="btn btn-outline profile-logout">Logout</button>
  </aside>

  <main class="profile-main">
        <section class="profile-section">
            <div class="profile-section-head">
                <h2 id="profile-section-title" class="display-text profile-title">LIKED POSTS</h2>
                <p id="profile-section-subtitle" class="muted">Danh sach bai viet ban da like gan day.</p>
            </div>

            <div id="profile-posts-grid" class="profile-grid">
                <p class="muted profile-status">Loading posts...</p>
            </div>

            <div id="profile-pagination" class="profile-pagination"></div>
    </section>
  </main>
</div>

<style>
.profile-dashboard {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 48px;
    align-items: start;
    padding-top: 8px;
}

@media (max-width: 880px) {
    .profile-dashboard {
        grid-template-columns: 1fr;
        gap: 24px;
    }
}

.profile-sidebar {
    border: 1px solid var(--line);
    background: #ffffff;
    padding: 24px;
    display: grid;
    gap: 20px;
}

.profile-kicker {
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 12px;
    color: var(--muted);
}

.profile-name {
    font-size: clamp(2rem, 5vw, 3rem);
    margin: 4px 0 10px;
}

.profile-email {
    margin: 0;
    font-size: 14px;
}

.profile-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.profile-tab {
    border: 1.5px solid #cacacb;
    background: transparent;
    color: #111111;
    border-radius: 30px;
    min-height: 44px;
    padding: 10px 18px;
    text-align: left;
    font-family: "Helvetica Now Text Medium", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
}

.profile-tab:hover {
    border-color: #707072;
    background: #f5f5f5;
}

.profile-tab.is-active {
    border-color: #111111;
    background: #111111;
    color: #ffffff;
}

.profile-logout {
    width: 100%;
    margin-top: 8px;
}

.profile-main {
    min-width: 0;
}

.profile-section-head {
    margin-bottom: 24px;
}

.profile-title {
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    margin-bottom: 12px;
}

.profile-section-head p {
    margin: 0;
}

.profile-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

@media (max-width: 1100px) {
    .profile-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 800px) {
    .profile-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 560px) {
    .profile-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

.profile-status {
    grid-column: 1 / -1;
    padding: 32px 0;
    text-align: center;
}

/* ── Pagination ──────────────────────────────────────────────────────────── */
.profile-pagination {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 24px;
}

.pagination-btn {
    border: 1.5px solid #cacacb;
    background: transparent;
    color: #111111;
    border-radius: 30px;
    min-width: 36px;
    height: 36px;
    padding: 0 12px;
    font-family: "Helvetica Now Text Medium", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.pagination-btn:hover:not(:disabled) {
    border-color: #707072;
    background: #f5f5f5;
}

.pagination-btn.is-current {
    border-color: #111111;
    background: #111111;
    color: #ffffff;
    cursor: default;
}

.pagination-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
}

.pagination-ellipsis {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    height: 36px;
    font-size: 14px;
    color: #707072;
    user-select: none;
}

.pagination-info {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
}

.profile-post {
    border: 1px solid #e5e5e5;
    background: #ffffff;
}

.profile-post-link {
    color: inherit;
    text-decoration: none;
}

.profile-media {
    background: #f5f5f5;
    aspect-ratio: 1 / 1;
    width: 100%;
    display: block;
    object-fit: cover;
}

.profile-meta {
    padding: 12px 12px 14px;
}

.profile-meta h3 {
    margin: 0;
    text-transform: uppercase;
    font-size: 16px;
    line-height: 1.25;
}

.profile-meta-row {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
}

.profile-badge {
    display: inline-flex;
    align-items: center;
    border: 1px solid #cacacb;
    border-radius: 30px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
}

@media (max-width: 640px) {
    .profile-title {
        font-size: clamp(2rem, 10vw, 3rem);
    }
}

/* ── Post Actions ───────────────────────────────────────────────────────── */
.profile-post-actions {
    display: flex;
    gap: 8px;
    padding: 0 12px 14px;
    margin-top: -6px;
}

.btn-action {
    border: 1.5px solid #cacacb;
    background: transparent;
    color: #111111;
    border-radius: 30px;
    padding: 6px 14px;
    font-family: "Helvetica Now Text Medium", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s ease, background 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 1;
}

.btn-action:hover {
    border-color: #707072;
    background: #f5f5f5;
}

.btn-action.delete {
    color: #D30005;
    border-color: #f5c6c8;
}

.btn-action.delete:hover {
    background: #fdf2f2;
    border-color: #D30005;
}
</style>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/profile.js' %}"></script>
{% endblock %}
