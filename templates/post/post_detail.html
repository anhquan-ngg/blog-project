{% extends "base.html" %} {% block title %}Post Details | Blog UI
{%endblock %} {% block content %}
<!-- Loading State -->
<div id="loading" class="post-detail-loading" style="display: none">
  <div class="skeleton skeleton-hero"></div>
  <div class="skeleton-content">
    <div class="skeleton skeleton-line" style="width: 80%"></div>
    <div class="skeleton skeleton-line" style="width: 60%"></div>
    <div class="skeleton skeleton-line" style="width: 100%"></div>
    <div class="skeleton skeleton-line" style="width: 90%"></div>
  </div>
</div>

<!-- Main Content -->
<article id="post-detail" class="post-detail-article" style="display: none">
  <div class="post-detail-hero" style="border-radius: 0;">
    <div id="post-cover" class="post-cover bg-placeholder" style="border-radius: 0 !important;"></div>
    <div class="hero-overlay">
      <h1 id="post-title" class="display-text text-white" style="font-family: 'Nike Futura ND', sans-serif; font-size: clamp(3rem, 6vw, 6rem); letter-spacing: -1.5px; line-height: 0.95;"></h1>
      <div class="post-meta" style="font-family: 'Helvetica Now Text', sans-serif; opacity: 0.9;">
        <span id="post-author"></span>
        <span id="post-date"></span>
      </div>
    </div>
  </div>

  <div class="post-body-container">
    <div class="post-actions" style="position: sticky; top: 80px; z-index: 10; padding: 12px 0; border-bottom: 1.5px solid var(--line); border-top: 1.5px solid var(--line); display: flex; align-items: center; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); margin-bottom: 32px;">
      <button id="btn-like" class="btn-icon" aria-label="Like post" style="width: 44px; height: 44px; margin-right: 8px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </button>
      <span id="like-count" style="font-weight: bold; margin-right: 24px; font-size: 16px;">0</span>
      <button id="btn-bookmark" class="btn-icon" aria-label="Save post" style="width: 44px; height: 44px; margin-right: 8px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      </button>
      <span id="bookmark-count" style="font-weight: bold; font-size: 16px;">0</span>
    </div>

    <!-- Tags -->
    <div id="post-tags" class="post-tags-list"></div>

    <div class="post-content" id="post-content">
      <!-- Content populated from JS API -->
    </div>
  </div>
</article>

<!-- Comments Section -->
<section class="comments-section" id="comments-section" style="display: none">
  <div class="post-body-container">
    <h2>Comments</h2>

    <!-- Comment input form -->
    <form id="comment-form" class="comment-form" style="margin-bottom: 48px; background: #F5F5F5; padding: 24px; border-radius: 0;">
      <textarea
        id="comment-content"
        name="content"
        rows="3"
        placeholder="Add a comment..."
        required
        style="width: 100%; border: none; border-bottom: 1.5px solid var(--line); border-radius: 0; padding: 12px 0; background: transparent; font-family: 'Helvetica Now Text', Helvetica, Arial, sans-serif; resize: vertical; margin-bottom: 16px; font-size: 16px;"
        onfocus="this.style.borderBottomColor='var(--ink)'"
        onblur="this.style.borderBottomColor='var(--line)'"
      ></textarea>
      
      <div style="display: flex; justify-content: space-between; align-items: center">
        <div style="display: flex; align-items: center;">
          <input type="file" id="comment-image" accept="image/*" style="display: none" />
          <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('comment-image').click()" style="border-radius: 30px; font-size: 14px; padding: 6px 16px; border-width: 1.5px;">
            Thêm Ảnh
          </button>
          <span id="comment-image-name" style="margin-left: 12px; font-size: 14px; color: #707072"></span>
        </div>
        <button type="submit" id="btn-submit-comment" class="btn btn-primary btn-sm" style="border-radius: 30px; font-size: 14px; padding: 8px 24px;">
          POST
        </button>
      </div>
      <div id="comment-error" style="color: #D30005; font-size: 14px; margin-top: 12px;"></div>
    </form>

    <div id="comments-list" class="comments-list" style="display: flex; flex-direction: column; gap: 24px;">
      <!-- Comments loaded via JS -->
    </div>
  </div>
</section>

<!-- Related Posts -->
<section
  class="related-posts-section"
  id="related-posts-section"
  style="display: none"
>
  <div class="post-body-container">
    <h2>Related Posts</h2>
    <div class="product-grid" id="related-posts-grid">
      <!-- Related posts via JS -->
    </div>
  </div>
</section>

<!-- Variables for JS -->
<script>
  window.POST_ID = Number("{{ slug|escapejs }}");
  window.POST_SLUG = "{{ slug|escapejs }}";
</script>
{% endblock %} {% block scripts %}
<script src="/static/js/api.js"></script>
<script src="/static/js/post_detail.js"></script>
{% endblock %}
